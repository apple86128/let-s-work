[pytest]
# pytest 設定檔
# 放在專案根目錄（與 app.py 同層）

# 將專案根目錄加入 Python 路徑，讓 `from app import ...` 可以正確找到模組
pythonpath = .

# 測試目錄
testpaths = tests

# 輸出設定
addopts =
    -v
    --tb=short
    --no-header

# 測試檔案/函數命名規則
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# 過濾特定警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.SAWarning
